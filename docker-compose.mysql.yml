services:
  nas-tools:
    image: linyuan0213/nas-tools:latest
    ports:
      - 3000:80
    volumes:
      - ./config:/config
      - /你的媒体目录:/你想设置的容器内能见到的目录
    environment:
      - PUID=0
      - PGID=0
      - UMASK=000
      - NT_PORT=3000
      # MySQL 数据库配置
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=nas_tools
      - DB_PASSWORD=nas_tools_password
      - DB_NAME=nas_tools
    restart: always
    hostname: nas-tools
    container_name: nas-tools
    networks:
      - nas-tools-network
    healthcheck:
      test: "wget -qO- http://localhost/health || exit 1"
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ocr:
        condition: service_started
      chrome:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: nas-tools-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=nas_tools
      - MYSQL_USER=nas_tools
      - MYSQL_PASSWORD=nas_tools_password
      - TZ=Asia/Shanghai
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - 3306:3306
    restart: always
    networks:
      - nas-tools-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: nas-tools-redis
    volumes:
      - ./config/redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - nas-tools-network

  ocr:
    image: linyuan0213/nas-tools-ocr:latest
    container_name: nas-tools-ocr
    ports:
      - 9300:9300
    restart: always
    networks:
      - nas-tools-network

  chrome:
    image: linyuan0213/nas-tools-chrome:latest
    container_name: nas-tools-chrome
    shm_size: 2g
    environment:
      - VNC_PASSWORD=password
    volumes:
      - ./data:/var/lib/chromium/user_data
    ports:
      - 9850:9850
      - 6080:6080
    restart: always
    networks:
      - nas-tools-network

networks:
  nas-tools-network:
    driver: bridge
    name: nas-tools-network
