services:
  migration:
    image: linyuan0213/nexus-media:latest
    volumes:
      - ./config:/config
    environment:
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=nexus_media
      - DB_PASSWORD=nexus_media_password
      - DB_NAME=nexus_media
    entrypoint: ["/nexus-media/.venv/bin/alembic"]
    command: ["upgrade", "head"]
    restart: "no"
    container_name: nexus-media-migration
    networks:
      - nexus-media-network
    depends_on:
      mysql:
        condition: service_healthy

  nexus-media:
    image: linyuan0213/nexus-media:latest
    ports:
      - 3000:8080
    volumes:
      - ./config:/config
      # 替换为你的实际媒体目录，例如：
      # - /mnt/media:/media
    environment:
      - PUID=0
      - PGID=0
      - UMASK=000
      - NEXUS_PORT=3000
      - SKIP_MIGRATION=true
      - REDIS__HOST=nexus-media-redis
      # MySQL 数据库配置
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=nexus_media
      - DB_PASSWORD=nexus_media_password
      - DB_NAME=nexus_media
    restart: always
    hostname: nexus-media
    container_name: nexus-media
    networks:
      - nexus-media-network
    healthcheck:
      test: "wget -qO- http://localhost:8080/health || exit 1"
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_started
      ocr:
        condition: service_started
      chrome:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: nexus-media-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=nexus_media
      - MYSQL_USER=nexus_media
      - MYSQL_PASSWORD=nexus_media_password
      - TZ=Asia/Shanghai
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - 3306:3306
    restart: always
    networks:
      - nexus-media-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: nexus-media-redis
    volumes:
      - ./config/redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - nexus-media-network

  ocr:
    image: linyuan0213/nexus-media-ocr:latest
    container_name: nexus-media-ocr
    ports:
      - 9300:9300
    restart: always
    networks:
      - nexus-media-network

  chrome:
    image: linyuan0213/nexus-media-chrome:latest
    container_name: nexus-media-chrome
    shm_size: 2g
    environment:
      - VNC_PASSWORD=password
    volumes:
      - ./data:/var/lib/chromium/user_data
    ports:
      - 9850:9850
      - 6080:6080
    restart: always
    networks:
      - nexus-media-network

networks:
  nexus-media-network:
    driver: bridge
    name: nexus-media-network
