name: ✨ 功能请求
description: 提出新功能或改进建议
title: 'Feature: '
labels: ['enhancement']

body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请尽可能详细描述，方便我们评估和实现。

  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      description: 这个功能涉及哪个部分？
      options:
        - 后端 API / 服务
        - 前端 Web UI
        - Docker / 部署
        - 插件
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 当前版本
      description: 你当前使用的版本
      placeholder: v3.8.0

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 详细描述你想要的功能
      placeholder: 描述功能的具体行为和效果
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 这个功能在什么场景下使用？解决了什么问题？
      placeholder: 描述使用场景和痛点
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 参考实现（可选）
      description: 是否有其他项目实现了类似功能？可以列举参考，但不要引用商业化软件。
      placeholder: 相关开源项目或文档链接

  - type: checkboxes
    id: terms
    attributes:
      label: 提交前确认
      options:
        - label: 已搜索现有 issues，确认未重复提交
          required: true
        - label: 已阅读文档，确认当前版本不支持该功能
          required: true
