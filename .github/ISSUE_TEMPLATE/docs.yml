name: 📚 文档问题
description: 文档缺失、错误或不清晰
title: 'Docs: '
labels: ['documentation']

body:
  - type: markdown
    attributes:
      value: |
        感谢反馈文档问题！

  - type: checkboxes
    id: type
    attributes:
      label: 问题类型
      options:
        - label: 文档缺失
        - label: 文档内容错误
        - label: 文档描述不清
        - label: 其他

  - type: textarea
    id: description
    attributes:
      label: 具体问题
      description: 哪里的文档有问题？
      placeholder: 描述文档问题和所在位置
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 改进建议
      description: 你认为应该如何改进？
    validations:
      required: true
