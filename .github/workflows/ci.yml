name: CI

on:
  push:
    branches: [dev, master, release]
  pull_request:
    branches: [dev, master]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Pyright
        run: uv run pyright tests/

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Prepare config
        run: |
          mkdir -p data
          cat > data/config.yaml <<'EOF'
          app:
            web_host: '0.0.0.0'
            web_port: 3000
            rmt_tmdbkey: 'dummy'
          EOF
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing
