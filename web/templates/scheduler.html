{% import 'macro/svg.html' as SVG %}
{% import 'macro/oops.html' as OOPS %}
<div class="container-xl">
  <div class="page-header d-print-none">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="page-title">调度任务</h2>
      </div>
      <div class="col-auto ms-auto d-print-none">
        <a href="javascript:load_scheduler_jobs()" class="btn btn-primary d-none d-sm-inline-block">
          <i data-lucide="refresh-cw" width="18" height="18" class="me-1"></i>刷新
        </a>
      </div>
    </div>
  </div>
</div>
<div class="page-body">
  <div class="container-xl">
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-vcenter card-table table-hover" id="scheduler_table">
            <thead>
              <tr>
                <th style="width: 26%;">任务</th>
                <th style="width: 18%;">触发器</th>
                <th style="width: 16%;">下次执行</th>
                <th style="width: 8%;">状态</th>
                <th style="width: 18%;">统计</th>
                <th class="w-1 text-nowrap">操作</th>
              </tr>
            </thead>
            <tbody id="scheduler_tbody">
              <tr><td colspan="6" class="text-center py-4 text-muted">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal modal-blur fade" id="modal-scheduler-edit" tabindex="-1" role="dialog" aria-hidden="true"
     data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">编辑调度任务</h5>
        <input type="hidden" id="scheduler_job_id">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label required">触发器类型</label>
              <select class="form-select" id="scheduler_trigger" onchange="on_trigger_change()">
                <option value="interval">间隔执行</option>
                <option value="cron">Cron表达式</option>
                <option value="date">指定时间</option>
              </select>
            </div>
          </div>
        </div>
        <div class="row" id="scheduler_interval_row">
          <div class="col-lg-4">
            <div class="mb-3">
              <label class="form-label">秒</label>
              <input type="number" class="form-control" id="scheduler_seconds" min="0">
            </div>
          </div>
          <div class="col-lg-4">
            <div class="mb-3">
              <label class="form-label">分钟</label>
              <input type="number" class="form-control" id="scheduler_minutes" min="0">
            </div>
          </div>
          <div class="col-lg-4">
            <div class="mb-3">
              <label class="form-label">小时</label>
              <input type="number" class="form-control" id="scheduler_hours" min="0">
            </div>
          </div>
        </div>
        <div class="row d-none" id="scheduler_cron_row">
          <div class="col-lg-12">
            <div class="mb-3">
              <label class="form-label required">Cron表达式 <span class="form-help"
                title="5位cron表达式，如 */5 * * * *" data-bs-toggle="tooltip">?</span></label>
              <input type="text" class="form-control" id="scheduler_cron" placeholder="*/5 * * * *">
            </div>
          </div>
        </div>
        <div class="row d-none" id="scheduler_date_row">
          <div class="col-lg-12">
            <div class="mb-3">
              <label class="form-label required">执行时间</label>
              <input type="datetime-local" class="form-control" id="scheduler_run_date">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-link me-auto" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="save_scheduler_job()">保存</button>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  function load_scheduler_jobs() {
    ajax_post("/api/web/scheduler/get_scheduler_jobs", {}, function (ret) {
      if (ret.code === 0) {
        render_scheduler_jobs(ret.data);
      } else {
        $("#scheduler_tbody").html(`<tr><td colspan="6" class="text-center py-4 text-danger">${ret.msg || '加载失败'}</td></tr>`);
      }
    }, true, false);
  }

  function format_interval(seconds) {
    if (!seconds) return 'interval';
    if (seconds >= 86400) {
      const days = (seconds / 86400).toFixed(1);
      return (days.endsWith('.0') ? (seconds / 86400).toFixed(0) : days) + ' 天';
    }
    if (seconds >= 3600) {
      const hours = (seconds / 3600).toFixed(1);
      return (hours.endsWith('.0') ? (seconds / 3600).toFixed(0) : hours) + ' 小时';
    }
    if (seconds >= 60) return (seconds / 60).toFixed(0) + ' 分钟';
    return seconds + ' 秒';
  }

  function relative_time(iso) {
    if (!iso) return '';
    const dt = new Date(iso);
    const diff = dt - new Date();
    const minutes = Math.round(diff / 60000);
    if (minutes < 0) return '已过期';
    if (minutes < 1) return '即将执行';
    if (minutes < 60) return minutes + ' 分钟后';
    const hours = Math.round(minutes / 60);
    if (hours < 24) return hours + ' 小时后';
    const days = Math.round(hours / 24);
    return days + ' 天后';
  }

  function trigger_badge(trigger_type, text) {
    const map = {
      interval: { cls: 'bg-blue-lt text-blue', icon: 'repeat' },
      cron: { cls: 'bg-purple-lt text-purple', icon: 'calendar-clock' },
      date: { cls: 'bg-orange-lt text-orange', icon: 'calendar' }
    };
    const item = map[trigger_type] || { cls: 'bg-secondary-lt text-secondary', icon: 'help-circle' };
    return `<span class="badge ${item.cls}"><i data-lucide="${item.icon}" width="12" height="12" class="me-1"></i>${text}</span>`;
  }

  function render_scheduler_jobs(jobs) {
    if (!jobs || jobs.length === 0) {
      $("#scheduler_tbody").html('<tr><td colspan="6" class="text-center py-4 text-muted">没有调度任务</td></tr>');
      return;
    }
    let html = '';
    for (let job of jobs) {
      let trigger_text = '';
      if (job.trigger_type === 'interval') {
        trigger_text = format_interval(job.trigger.seconds);
      } else if (job.trigger_type === 'cron') {
        trigger_text = job.trigger.expression || 'cron';
      } else if (job.trigger_type === 'date') {
        trigger_text = (job.trigger.run_date || '').replace('T', ' ').substring(0, 19);
      } else {
        trigger_text = job.trigger.type || 'unknown';
      }

      let next_run = job.next_run_time ? job.next_run_time.replace('T', ' ').substring(0, 19) : '-';
      let next_run_rel = job.next_run_time && !job.paused ? `<div class="text-muted" style="font-size: 12px;">${relative_time(job.next_run_time)}</div>` : '';

      let status_badge = job.paused
        ? '<span class="status-dot status-dot-animated status-dot-red me-1"></span>已暂停'
        : '<span class="status-dot status-dot-animated status-dot-green me-1"></span>运行中';
      let avatar_color = job.paused ? 'bg-secondary-lt text-secondary' : 'bg-green-lt text-green';

      let stats = job.statistics || {};
      let total = stats.total_runs || 0;
      let success = stats.success_count || 0;
      let fail = stats.failure_count || 0;
      let success_pct = total ? Math.round((success / total) * 100) : 0;
      let fail_pct = total ? Math.round((fail / total) * 100) : 0;

      let stats_html = `
        <div class="d-flex align-items-center gap-2">
          <div class="text-muted" style="font-size: 12px; min-width: 48px;">${success_pct}% 成功</div>
          <div class="progress flex-fill" style="height: 6px; min-width: 60px; max-width: 120px;">
            <div class="progress-bar bg-green" style="width: ${success_pct}%" role="progressbar"></div>
            <div class="progress-bar bg-red" style="width: ${fail_pct}%" role="progressbar"></div>
          </div>
          <div class="text-muted" style="font-size: 12px; min-width: 40px;">${total} 次</div>
        </div>`;

      let actions = '';
      if (job.paused) {
        actions += `<a href="javascript:resume_job('${job.id}')" class="btn btn-outline-success btn-icon btn-sm" title="恢复"><i data-lucide="play" width="16" height="16"></i></a>`;
      } else {
        actions += `<a href="javascript:pause_job('${job.id}')" class="btn btn-outline-warning btn-icon btn-sm" title="暂停"><i data-lucide="pause" width="16" height="16"></i></a>`;
      }
      actions += `<a href="javascript:run_job('${job.id}')" class="btn btn-outline-primary btn-icon btn-sm" title="立即执行"><i data-lucide="zap" width="16" height="16"></i></a>`;
      actions += `<a href="javascript:edit_job('${job.id}', '${job.trigger_type}', '${encodeURIComponent(JSON.stringify(job.trigger))}')" class="btn btn-outline-info btn-icon btn-sm" title="编辑"><i data-lucide="pencil" width="16" height="16"></i></a>`;
      actions += `<a href="javascript:delete_job('${job.id}')" class="btn btn-outline-danger btn-icon btn-sm" title="删除"><i data-lucide="trash-2" width="16" height="16"></i></a>`;

      html += `<tr>
        <td>
          <div class="d-flex align-items-center">
            <span class="${avatar_color} avatar avatar-sm me-3"><i data-lucide="clock" width="18" height="18"></i></span>
            <div>
              <div class="font-weight-medium text-truncate" style="max-width: 220px;" title="${job.name || job.id}">${job.name || job.id}</div>
              <div class="text-muted text-truncate" style="font-size: 12px; max-width: 220px;" title="${job.id}">${job.id}</div>
            </div>
          </div>
        </td>
        <td>
          <div class="d-flex flex-wrap gap-1">${trigger_badge(job.trigger_type, trigger_text)}</div>
        </td>
        <td class="text-nowrap">
          <div>${next_run}</div>
          ${next_run_rel}
        </td>
        <td class="text-nowrap"><div class="d-flex align-items-center">${status_badge}</div></td>
        <td>${stats_html}</td>
        <td class="text-nowrap" style="width: 1%;">
          <div class="btn-list flex-nowrap gap-1">${actions}</div>
        </td>
      </tr>`;
    }
    $("#scheduler_tbody").html(html);
    if (window.lucide) {
      lucide.createIcons();
    }
  }

  function on_trigger_change() {
    const type = $("#scheduler_trigger").val();
    $("#scheduler_interval_row").toggleClass("d-none", type !== "interval");
    $("#scheduler_cron_row").toggleClass("d-none", type !== "cron");
    $("#scheduler_date_row").toggleClass("d-none", type !== "date");
  }

  function edit_job(id, trigger_type, trigger_json) {
    $("#scheduler_job_id").val(id);
    $("#scheduler_trigger").val(trigger_type || "interval");
    on_trigger_change();

    let trigger = {};
    try {
      trigger = JSON.parse(decodeURIComponent(trigger_json));
    } catch (e) {}

    $("#scheduler_seconds").val('');
    $("#scheduler_minutes").val('');
    $("#scheduler_hours").val('');
    $("#scheduler_cron").val('');
    $("#scheduler_run_date").val('');

    if (trigger_type === 'interval') {
      if (trigger.seconds) {
        let sec = trigger.seconds;
        $("#scheduler_hours").val(Math.floor(sec / 3600));
        $("#scheduler_minutes").val(Math.floor((sec % 3600) / 60));
        $("#scheduler_seconds").val(sec % 60);
      }
    } else if (trigger_type === 'cron') {
      $("#scheduler_cron").val(trigger.expression || '');
    } else if (trigger_type === 'date') {
      if (trigger.run_date) {
        let val = trigger.run_date.substring(0, 16);
        $("#scheduler_run_date").val(val);
      }
    }

    $("#modal-scheduler-edit").modal('show');
  }

  function save_scheduler_job() {
    const id = $("#scheduler_job_id").val();
    const trigger = $("#scheduler_trigger").val();
    const payload = { id: id, trigger: trigger };

    if (trigger === 'interval') {
      const seconds = parseInt($("#scheduler_seconds").val() || 0);
      const minutes = parseInt($("#scheduler_minutes").val() || 0);
      const hours = parseInt($("#scheduler_hours").val() || 0);
      if (seconds > 0) payload.seconds = seconds;
      if (minutes > 0) payload.minutes = minutes;
      if (hours > 0) payload.hours = hours;
      if (!seconds && !minutes && !hours) {
        show_fail_modal("请至少设置一个时间间隔");
        return;
      }
    } else if (trigger === 'cron') {
      payload.cron = $("#scheduler_cron").val().trim();
      if (!payload.cron) {
        show_fail_modal("Cron表达式不能为空");
        return;
      }
    } else if (trigger === 'date') {
      payload.run_date = $("#scheduler_run_date").val();
      if (!payload.run_date) {
        show_fail_modal("执行时间不能为空");
        return;
      }
    }

    ajax_post("/api/web/scheduler/update_scheduler_job", payload, function (ret) {
      $("#modal-scheduler-edit").modal('hide');
      if (ret.code === 0) {
        show_success_modal("保存成功");
        load_scheduler_jobs();
      } else {
        show_fail_modal(ret.msg || "保存失败");
      }
    });
  }

  function pause_job(id) {
    ajax_post("/api/web/scheduler/pause_scheduler_job", { id: id }, function (ret) {
      if (ret.code === 0) load_scheduler_jobs();
      else show_fail_modal(ret.msg || "暂停失败");
    });
  }

  function resume_job(id) {
    ajax_post("/api/web/scheduler/resume_scheduler_job", { id: id }, function (ret) {
      if (ret.code === 0) load_scheduler_jobs();
      else show_fail_modal(ret.msg || "恢复失败");
    });
  }

  function run_job(id) {
    ajax_post("/api/web/scheduler/run_scheduler_job", { id: id }, function (ret) {
      if (ret.code === 0) show_success_modal("任务已触发");
      else show_fail_modal(ret.msg || "触发失败");
    });
  }

  function delete_job(id) {
    show_confirm_modal("确定要删除任务 " + id + " 吗？", function () {
      hide_confirm_modal();
      ajax_post("/api/web/scheduler/delete_scheduler_job", { id: id }, function (ret) {
        if (ret.code === 0) load_scheduler_jobs();
        else show_fail_modal(ret.msg || "删除失败");
      });
    });
  }

  $(document).ready(function () {
    load_scheduler_jobs();
  });
</script>
